    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let idUsuario = sessionStorage.ID_USUARIO;

    function puxarHistorico() {

        

        fetch(`/lidos/puxarHistorico/${idUsuario}`)

            .then(function (response) {

                response.json().then(function (resposta) {

                    plotarGraficoLidos(resposta);
                    // totalLivrosLidos(resposta);

                });

            });

    }

    function plotarGraficoLidos(resposta) {

        let frase = document.getElementById("frase");
        let lidos = resposta[0].livros_lidos;
        let total = 10
        let naoLidos = total - lidos;

        let dados = {
            labels: ["Lidos", "Não lidos"],
            datasets: [{
                label: "Status de leitura",
                data: [lidos, naoLidos],
                backgroundColor: ["#90CF8E", "#737373"]
            }]
        };

        const config = {
            type: "doughnut",
            data: dados
        };

        let grafico = new Chart(
            document.getElementById("grafico1"),
            config
        );

        if (naoLidos <= 2) {
            frase.innerHTML = `Você está virando quase uma sósia da Rory Gilmore`;
        } else if (naoLidos <= 5) {
            frase.innerHTML = `Continue assim, sua evolução na leitura merece palmas!`;

        } else if (naoLidos <= 9) {
            frase.innerHTML = `Você está no caminho certo, o importante não é quantidade, é começar!`;
        }

        console.log(lidos, total, naoLidos);
    }

    function puxarGenero() {


        fetch(`/lidos/puxarGenero/${idUsuario}`)

            .then(function (response) {

                response.json().then(function (resposta) {
                
                    plotarGraficoGenero(resposta);
                    generoMaisLido(resposta);

                });

            });
        }

    function plotarGraficoGenero(resposta) {
           
    let total = 0;

    let fantasia = 0;
    let romance = 0;
    let biografia = 0;
    let terror = 0;
    let drama = 0;
    let musical = 0;

    
    for (let i = 0; i < resposta.length; i++) {

        total += resposta[i].quantidade;

        if (resposta[i].genero == "Fantasia") {

            fantasia = resposta[i].quantidade;

        } else if (resposta[i].genero == "Romance") {

            romance = resposta[i].quantidade;

        } else if (resposta[i].genero == "Biografia") {

            biografia = resposta[i].quantidade;

        } else if (resposta[i].genero == "Terror") {

            terror = resposta[i].quantidade;

        } else if (resposta[i].genero == "Drama") {

            drama = resposta[i].quantidade;

        } else if (resposta[i].genero == "Musical") {

            musical = resposta[i].quantidade;

        }

    }

    let dadosGenero = {

        labels: ["fantasia", "romance", "biografia", "terror", "drama", "musical"],

        datasets: [{

            label: "Gêneros lidos",

            data: [

                ((fantasia / total) * 100).toFixed(0),
                ((romance / total) * 100).toFixed(0),
                ((biografia / total) * 100).toFixed(0),
                ((terror / total) * 100).toFixed(0),
                ((drama / total) * 100).toFixed(0),
                ((musical / total) * 100).toFixed(0)

            ],

            minBarLength: 5,

            backgroundColor: [
                "blue",
                "pink",
                "#facc15",
                "#ef4444",
                "#fb923c",
                "#34d399"
            ]

        }]
    };

    const config = {

        type: "bar",

        data: dadosGenero,

        options: {

            indexAxis: 'y',

            plugins: {

                legend: {

                    display: false

                }

            },

            scales: {

                x: {

                    display: true,

                    title: {

                        display: true,

                        text: '%'

                    },

                    beginAtZero: true,

                    max: 100

                },

                y: {

                    display: true

                }

            }

        }

    };

    let grafico = new Chart(

        document.getElementById("grafico2"),

        config

    );

}

        function generoMaisLido(resposta) {

            let generoMaior = resposta[0];

            for (let i = 0; i < resposta.length; i++) {
               
                if (resposta[i].quantidade > generoMaior.quantidade) {
                     generoMaior = resposta[i]; 

                    }
                 } 

                kpiGenero.innerHTML = `Gênero mais lido: <br><br><span>${generoMaior.genero}</span>` ;
                
            }


            function totalPaginasLidas(resposta) {

                fetch(`/lidos/puxarPaginas/${idUsuario}`)

                .then(function(response) {

            response.json().then(function(resposta) {

                let totalPaginas = 0;

                for (let i = 0; i < resposta.length; i++) {

                    totalPaginas += resposta[i].qtdPaginas;

                }

                kpiPaginas.innerHTML = `Total de páginas lidas:<br><br><span>${totalPaginas}</span>`;

            });

        });




            }
