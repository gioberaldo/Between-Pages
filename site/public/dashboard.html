    function puxarHistorico() {

        

        fetch(`/lidos/puxarHistorico/${idUsuario}`)

            .then(function (response) {

                response.json().then(function (resposta) {

                    plotarGraficoLidos(resposta);
                    totalLivrosLidos(resposta);

                });

            });

    }

    function plotarGraficoLidos(resposta) {

        let frase = document.getElementById("frase");
        let lidos = resposta[0].livros_lidos;
        let total = 10
        let naoLidos = total - lidos;

        let dados = {
            labels: ["Lidos", "Não lidos"],
            datasets: [{
                label: "Status de leitura",
                data: [lidos, naoLidos],
                backgroundColor: ["#647ea0", "#737373"]
            }]
        };

        const config = {
            type: "doughnut",
            data: dados
        };

        let grafico = new Chart(
            document.getElementById("grafico1"),
            config
        );

        if (naoLidos <= 2) {
            frase.innerHTML = `Você está virando quase uma sósia da Rory Gilmore`;
        } else if (naoLidos <= 5) {
            frase.innerHTML = `Continue assim, sua evolução na leitura merece palmas!`;

        } else if (naoLidos <= 9) {
            frase.innerHTML = `Você está no caminho certo, o importante não é quantidade, é começar!`;
        }

        console.log(lidos, total, naoLidos);
    }

        function plotarGraficoGenero(resposta) {
    let generos = [];
    let quantidade = [];

    for (let i = 0; i < resposta.length; i++) {

        generos.push(resposta[i].genero);

        quantidade.push(resposta[i].quantidade);

    }

    let dadosGenero = {

        labels: generos,

        datasets: [{
            
            label: "Gêneros lidos",

            data: quantidade,

            backgroundColor: [
                "#8da9c4",
                "#c084fc",
                "#facc15",
                "#ef4444",
                "#fb923c",
                "#34d399"
            ]

        }]
    };

    const config = {

        type: "bar",

        data: dadosGenero,

        options: {

            indexAxis: 'y',

            plugins: {

                legend: {

                    display: false

                }

            },

            scales: {

                x: {

                    beginAtZero: true

                }

            }

        }

    };

    let grafico = new Chart(

        document.getElementById("grafico2"),

        config

    );

}
